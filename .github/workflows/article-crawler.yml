name: Article Crawler

on:
  workflow_dispatch:

jobs:
  crawl-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run article crawler
        run: |
          node index.js \
            --sitemap "https://www.jacksonholetraveler.com/article-sitemap.xml" \
            --businesses "./businesses.csv" \
            --limit 9999

      - name: Upload crawler output
        uses: actions/upload-artifact@v4
        with:
          name: article-crawler-output
          path: output/